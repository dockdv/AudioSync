name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.0)"
        required: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Validate version format
        run: |
          if [[ ! "${{ github.event.inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Version must match vX.Y.Z (e.g. v1.2.0)"
            exit 1
          fi

      - name: Check release does not already exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.event.inputs.version }}" &>/dev/null; then
            echo "ERROR: Release ${{ github.event.inputs.version }} already exists"
            exit 1
          fi

      - name: Update version in csproj
        run: |
          VER="${{ github.event.inputs.version }}"
          VER="${VER#v}"
          CSPROJ=src/webGUI/src/AudioSync.Web/AudioSync.Web.csproj
          if grep -q '<Version>' "$CSPROJ"; then
            sed -i "s|<Version>.*</Version>|<Version>${VER}</Version>|" "$CSPROJ"
          else
            sed -i "s|</PropertyGroup>|  <Version>${VER}</Version>\n  </PropertyGroup>|" "$CSPROJ"
          fi

      - name: Commit and tag
        run: |
          git config user.name "dockdv"
          git config user.email "dockdv@users.noreply.github.com"
          git add src/webGUI/src/AudioSync.Web/AudioSync.Web.csproj
          git diff --cached --quiet || git commit -m "release: ${{ github.event.inputs.version }}"
          git tag -f "${{ github.event.inputs.version }}"
          git push origin main
          git push origin "${{ github.event.inputs.version }}" --force

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            asset: AudioSync-win-x64.exe
            bin: AudioSync.Web.exe
          - os: ubuntu-latest
            rid: linux-x64
            asset: AudioSync-linux-x64
            bin: AudioSync.Web
          - os: macos-latest
            rid: osx-arm64
            asset: AudioSync-osx-arm64.dmg
            bin: AudioSync.Web
          - os: macos-latest
            rid: osx-x64
            asset: AudioSync-osx-x64.dmg
            bin: AudioSync.Web
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.version }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore src/webGUI/AudioSync.slnx

      - name: Publish single-file binary
        shell: bash
        run: |
          dotnet publish src/webGUI/src/AudioSync.Web/AudioSync.Web.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -o dist

      - name: Stage release artifact
        shell: bash
        run: |
          mkdir -p release
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            VER="${{ github.event.inputs.version }}"
            VER="${VER#v}"
            APP="AudioSync.app"
            rm -rf "$APP"
            mkdir -p "$APP/Contents/MacOS"
            cp "dist/${{ matrix.bin }}" "$APP/Contents/MacOS/AudioSync"
            chmod +x "$APP/Contents/MacOS/AudioSync"
            cat > "$APP/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>AudioSync</string>
            <key>CFBundleIdentifier</key><string>dev.dockdv.audiosync</string>
            <key>CFBundleName</key><string>AudioSync</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleVersion</key><string>${VER}</string>
            <key>CFBundleShortVersionString</key><string>${VER}</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
            hdiutil create -volname AudioSync -srcfolder "$APP" -size 500m -fs HFS+ -ov -format UDZO "release/${{ matrix.asset }}"
          else
            cp "dist/${{ matrix.bin }}" "release/${{ matrix.asset }}"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: release/${{ matrix.asset }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ github.event.inputs.version }}" \
            artifacts/AudioSync-win-x64.exe \
            artifacts/AudioSync-linux-x64 \
            artifacts/AudioSync-osx-arm64.dmg \
            artifacts/AudioSync-osx-x64.dmg \
            --title "${{ github.event.inputs.version }}" \
            --generate-notes
