name: Docker Image CI

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/audiosync
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/audiosync

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "date=$(date +%Y%m%d-%H%M)" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "release=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            latest=$(gh release view --json tagName -q .tagName 2>/dev/null || true)
            if [ -n "$latest" ]; then
              echo "release=$latest" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/contApp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          secrets: |
            ffmpeg_pat=${{ secrets.FFMPEG_PAT }}
          tags: |
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ steps.tag.outputs.date }}
            ${{ steps.tag.outputs.release && format('{0}:{1}', env.GHCR_IMAGE, steps.tag.outputs.release) || '' }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.tag.outputs.date }}
            ${{ steps.tag.outputs.release && format('{0}:{1}', env.DOCKERHUB_IMAGE, steps.tag.outputs.release) || '' }}
